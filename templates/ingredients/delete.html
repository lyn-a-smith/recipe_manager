{% extends "base.html" %}

{% block title %}
    Delete Ingredient
{% endblock title %}

{% block content %}
    <h1>Delete Ingredient: {{ ingredient.name }} </h1>
    <p>Are you sure you want to delete <strong>{{ ingredient.name }}</strong>?</p>
    <form method="POST">
        {% csrf_token %}
        <input type="submit" value="Confirm" class="btn btn-danger">
    </form>
    <a href="{% url 'ingredients_detail' ingredient.id %}" class="btn btn-secondary">Cancel</a>
{% endblock content %}
