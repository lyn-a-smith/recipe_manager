{% extends 'base.html' %}

{% block title %}
    Ingredient Detail
{% endblock %}

{% block content %}
    <h2>{{ingredient.name}}</h2>
    <p>Description: {{ingredient.description}}
    
    <hr>
    <a href="{% url 'ingredients_edit' ingredient.id %}" class="btn btn-primary">Edit</a>
    <a href="{% url 'ingredients_delete' ingredient.id %}" class="btn btn-danger">Delete</a>   
{% endblock content %}
